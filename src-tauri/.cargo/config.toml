[build]
# --- CROSS-PLATFORM CONFIGURATION ---

# WINDOWS OPTIMIZATION:
# Moving the target directory out of synced folders (like OneDrive/Downloads)
# prevents the Windows Search indexer and Defender from locking files mid-compilation.
# To enable this on Windows, uncomment the lines below:
# target-dir = "C:\\cargo-target\\mdxera-erp"
# jobs = 4

# MAC/LINUX:
# It is recommended to use the default target directory. 
# Do not uncomment the Windows-specific paths above as they will cause errors.

# NOTE: For machine-specific paths, you can also set the CARGO_TARGET_DIR 
# environment variable in your system instead of editing this file.
